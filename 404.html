<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Page not found on the website of Andreas Hernández Hauser."
    />
    <meta name="robots" content="noindex, follow" />
    <meta name="author" content="Andreas Hernández Hauser" />
    <link rel="canonical" href="https://andreashdez.com/404.html" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="andreashdez" />
    <meta property="og:title" content="Page not found" />
    <meta
      property="og:description"
      content="This page does not exist on andreashdez.com."
    />
    <meta property="og:url" content="https://andreashdez.com/404.html" />
    <meta
      property="og:image"
      content="https://andreashdez.com/social-preview.png"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="andreashdez logo" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Page not found" />
    <meta
      name="twitter:description"
      content="This page does not exist on andreashdez.com."
    />
    <meta
      name="twitter:image"
      content="https://andreashdez.com/social-preview.png"
    />
    <meta name="twitter:image:alt" content="andreashdez logo" />
    <meta name="theme-color" content="#eff6e0" id="theme-color-meta" />
    <script>
      (function () {
        var storageKey = "theme";
        var root = document.documentElement;
        var lightThemeColor = "#eff6e0";
        var darkThemeColor = "#01161e";
        var savedTheme = null;

        try {
          savedTheme = localStorage.getItem(storageKey);
        } catch (error) {
          savedTheme = null;
        }

        var theme =
          savedTheme === "dark" || savedTheme === "light"
            ? savedTheme
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";

        root.dataset.theme = theme;

        var themeColorMeta = document.querySelector('meta[name="theme-color"]');
        if (themeColorMeta) {
          themeColorMeta.setAttribute(
            "content",
            theme === "dark" ? darkThemeColor : lightThemeColor,
          );
        }
      })();
    </script>
    <script src="assets/js/theme.js" defer></script>
    <title>404 - Page Not Found</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link
      rel="preload"
      href="/assets/fonts/Alegreya-VariableFont_wght.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/assets/fonts/Alegreya-Italic-VariableFont_wght.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="assets/css/main.css" />
    <style>
      main.not-found {
        display: grid;
        place-content: center;
        gap: 1rem;
        text-align: center;
      }

      .status {
        margin: -0.3em 0 0 0;
        font-size: clamp(1rem, 16vw, 24rem);
        color: var(--color3);
      }

      .status-definition {
        margin: 0;
      }

      .home-link {
        display: inline-block;
        margin-top: 0.25rem;
        padding: 0.6rem 1.2rem;
        border-radius: 999px;
        border: 2px solid currentColor;
        color: inherit;
        text-decoration: none;
        font-weight: 600;
        transition:
          transform 0.2s ease,
          background-color 0.2s ease,
          color 0.2s ease;
      }

      .home-link:hover,
      .home-link:focus-visible {
        background-color: var(--color1);
        color: var(--color5);
        background-color: light-dark(var(--color1), var(--color5));
        color: light-dark(var(--color5), var(--color1));
      }

      @media (prefers-reduced-motion: reduce) {
        .home-link {
          transition: none;
        }

        .home-link:hover,
        .home-link:focus-visible {
          transform: none;
        }
      }
    </style>
  </head>

  <body>
    <main class="not-found">
      <h1 class="status font-italic">404</h1>
      <h2 class="status-definition">Page not found</h2>
      <p>
        <a class="home-link" href="/">Go back home</a>
      </p>
    </main>
  </body>
</html>
