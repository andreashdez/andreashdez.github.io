# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Runs checks for pull requests targeting main
  pull_request:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2
      - name: Validate HTML
        run: npm run quality:html
      - name: Check internal links
        run: |
          python3 -m http.server 8080 --directory . &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          npm run quality:links
      - name: Lighthouse CI
        run: npm run quality:lighthouse
      - name: Accessibility audit (pa11y)
        run: |
          python3 -m http.server 8080 --directory . &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          npm run quality:a11y

  deploy:
    if: ${{ github.event_name == 'push' }}
    needs: quality
    permissions:
      contents: read
      pages: write
      id-token: write
    # Allow only one concurrent deployment without blocking pull request checks.
    concurrency:
      group: "pages"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Prepare Pages artifact
        run: |
          mkdir _site
          cp index.html 404.html robots.txt sitemap.xml site.webmanifest _site/
          cp favicon.ico favicon.svg apple-touch-icon.png social-preview.png _site/
          cp icon-192.png icon-512.png icon-maskable-192.png icon-maskable-512.png _site/
          cp -R assets _site/assets
          touch _site/.nojekyll
          if [ -f CNAME ]; then cp CNAME _site/CNAME; fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
